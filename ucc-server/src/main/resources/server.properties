#   server.ws.port=8081
#   server.selfplay.workers=2
#   server.batch.size=64
#   server.batch.timeout_ms=5
#   server.ringbuffer.size=4096
#   server.tt.max_entries=100000
#   server.mcts.simulations=8
#   server.mcts.time_limit_ms=500
# ═══════════════════════════════════════════════════════════════════
